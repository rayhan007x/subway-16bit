<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfer 16-Bit Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; border: 4px solid #444; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 360,
    height: 640,
    pixelArt: true, // Crucial for 16-bit look
    physics: {
        default: 'arcade',
        arcade: { debug: false }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);

let player;
let cursors;
let obstacles;
let score = 0;
let scoreText;
let gameSpeed = 5;
let isGameOver = false;

function preload() {
    // Using placeholders with 16-bit color palettes
    this.load.image('lane', 'https://labs.phaser.io/assets/sprites/asplode.png'); // Just for a texture ref
}

function create() {
    // 1. Setup Tracks (3 Lanes)
    const centerX = this.cameras.main.centerX;
    this.add.rectangle(centerX, 320, 240, 640, 0x333333); // Road
    this.add.rectangle(centerX - 80, 320, 2, 640, 0x555555); // Lane Line 1
    this.add.rectangle(centerX + 80, 320, 2, 640, 0x555555); // Lane Line 2

    // 2. Player Setup (16-bit Sprite Placeholder)
    player = this.add.rectangle(centerX, 550, 40, 60, 0x00ff00);
    this.physics.add.existing(player);
    player.lane = 1; // 0: Left, 1: Center, 2: Right

    // 3. Obstacles Group
    obstacles = this.physics.add.group();

    // 4. Input Handling
    cursors = this.input.keyboard.createCursorKeys();

    // 5. UI/UX Score Board
    scoreText = this.add.text(20, 20, 'SCORE: 0', { 
        fontFamily: '"Courier New", Courier, monospace',
        fontSize: '24px',
        fill: '#ffffff',
        stroke: '#000',
        strokeThickness: 4
    });

    // Spawn loop
    this.time.addEvent({
        delay: 1200,
        callback: spawnObstacle,
        callbackScope: this,
        loop: true
    });
}

function update() {
    if (isGameOver) return;

    // Smooth Lane Switching Logic
    if (Phaser.Input.Keyboard.JustDown(cursors.left) && player.lane > 0) {
        player.lane--;
    } else if (Phaser.Input.Keyboard.JustDown(cursors.right) && player.lane < 2) {
        player.lane++;
    }

    // Move player to lane X
    const targetX = 100 + (player.lane * 80);
    player.x = Phaser.Math.Linear(player.x, targetX, 0.2);

    // Obstacle logic
    obstacles.getChildren().forEach(obs => {
        obs.y += gameSpeed;
        if (obs.y > 700) {
            obs.destroy();
            score += 10;
            scoreText.setText('SCORE: ' + score);
            // Dynamic difficulty
            gameSpeed += 0.05;
        }
    });

    // Collision
    this.physics.add.overlap(player, obstacles, gameOver, null, this);
}

function spawnObstacle() {
    if (isGameOver) return;
    const lane = Phaser.Math.Between(0, 2);
    const x = 100 + (lane * 80);
    const obs = this.add.rectangle(x, -50, 50, 50, 0xff0000);
    obstacles.add(obs);
}

function gameOver() {
    isGameOver = true;
    this.physics.pause();
    
    // UI/UX Game Over Overlay
    const overlay = this.add.rectangle(180, 320, 360, 640, 0x000000, 0.7);
    this.add.text(60, 250, 'GAME OVER', { fontSize: '40px', fill: '#ff0000', fontWeight: 'bold' });
    this.add.text(80, 310, 'Final Score: ' + score, { fontSize: '20px', fill: '#fff' });
    this.add.text(55, 400, 'REFRESH TO RESTART', { fontSize: '18px', fill: '#00ff00' });
}
</script>

</body>
</html>
